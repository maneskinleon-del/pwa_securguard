<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="SecurGuard AI">
  <title>SecurGuard AI (maskable)</title>
  <!-- Maskable icon: design must fit inside the inner ~80% safe zone so OS
       masks don't crop the brand mark. Solid background fills the whole canvas. -->
  <rect width="512" height="512" fill="#0b1326"/>
  <!-- Shield scaled into the safe zone -->
  <g transform="translate(256 256) scale(0.72) translate(-256 -256)">
    <path d="M256 96 L112 148 V268 C112 348 174 416 256 448 C338 416 400 348 400 268 V148 Z"
          fill="none" stroke="#818cf8" stroke-width="22" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="M196 262 L238 304 L324 218"
          fill="none" stroke="#a5b4fc" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
