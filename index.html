<!doctype html>
<html lang="es" class="dark notranslate" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Prevent browser/Google auto-translation: it rewrites text nodes into <font> wrappers,
         which breaks React's DOM reconciliation and throws "Failed to execute 'insertBefore'". -->
    <meta name="google" content="notranslate" />
    <meta name="theme-color" content="#0b1326" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SecurGuard" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <title>SecurGuard AI - Control de Acceso</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      /* Ensure scrollbars are dark and styled elegantly */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #0b1326;
      }
      ::-webkit-scrollbar-thumb {
        background: #2d3449;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #464554;
      }
      body {
        background-color: #0b1326;
      }
    </style>
  </head>
  <body class="bg-[#0b1326] text-[#dae2fd]">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
